<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formulae — Film Lab Chemical Database</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b0f14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Formulae">
<link rel="apple-touch-icon" href="icons/icon-512x512.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>
<style>
/* ─── CSS VARIABLES ─── */
:root {
  --bg: #0b0f14;
  --bg-secondary: #111822;
  --surface: rgba(255,255,255,0.06);
  --surface-hover: rgba(255,255,255,0.10);
  --border: rgba(255,255,255,0.08);
  --border-bright: rgba(255,255,255,0.15);
  --accent: #00e5ff;
  --accent-dim: rgba(0,229,255,0.7);
  --accent-glow: rgba(0,229,255,0.15);
  --accent-subtle: rgba(0,229,255,0.08);
  --red: #ff4444;
  --red-glow: rgba(255,68,68,0.15);
  --green: #00e676;
  --orange: #ffab40;
  --purple: #b388ff;
  --text: #e6edf3;
  --text-dim: #9aa7b2;
  --text-faint: rgba(154,167,178,0.5);
  --white: #f0f6fc;
  --sidebar-width: 240px;
  --gold: #00e5ff;
  --gold-dim: rgba(0,229,255,0.7);
  --amber: #ffab40;
}

/* ─── DARKROOM MODE ─── */
.darkroom-mode {
  --bg: #0d0000;
  --bg-secondary: #120000;
  --surface: rgba(180,30,30,0.12);
  --surface-hover: rgba(180,30,30,0.18);
  --border: rgba(180,30,30,0.25);
  --border-bright: rgba(220,60,60,0.45);
  --accent: #ff3333;
  --accent-dim: rgba(255,51,51,0.7);
  --accent-glow: rgba(255,51,51,0.15);
  --accent-subtle: rgba(255,51,51,0.08);
  --gold: #ff3333;
  --gold-dim: rgba(255,51,51,0.7);
  --amber: #ff5555;
  --text: #ff4444;
  --text-dim: rgba(255,68,68,0.75);
  --text-faint: rgba(200,55,55,0.5);
  --white: #ff3333;
}

/* ─── LIGHT MODE ─── */
.light-mode {
  --bg: #f0f2f5;
  --bg-secondary: #e4e8ec;
  --surface: rgba(0,0,0,0.04);
  --surface-hover: rgba(0,0,0,0.07);
  --border: rgba(0,0,0,0.1);
  --border-bright: rgba(0,0,0,0.18);
  --accent: #0097a7;
  --accent-dim: rgba(0,151,167,0.7);
  --accent-glow: rgba(0,151,167,0.12);
  --accent-subtle: rgba(0,151,167,0.06);
  --gold: #0097a7;
  --gold-dim: rgba(0,151,167,0.7);
  --amber: #e65100;
  --red: #c62828;
  --red-glow: rgba(198,40,40,0.1);
  --text: #1a2332;
  --text-dim: rgba(26,35,50,0.7);
  --text-faint: rgba(26,35,50,0.45);
  --white: #0d1520;
}

/* ─── BASE ─── */
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  min-height: 100vh;
  overflow-x: hidden;
  transition: background 0.5s ease, color 0.5s ease;
}

/* ─── BACKGROUND GRID ─── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,229,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,255,0.025) 1px, transparent 1px);
  background-size: 50px 50px;
  pointer-events: none;
  z-index: 0;
}
.light-mode body::before {
  background-image:
    linear-gradient(rgba(0,151,167,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,151,167,0.04) 1px, transparent 1px);
}
.darkroom-mode body::before {
  background-image:
    linear-gradient(rgba(255,0,0,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,0,0,0.03) 1px, transparent 1px);
}

body::after {
  content: '';
  position: fixed;
  top: -20%;
  left: 30%;
  width: 60vw;
  height: 60vh;
  background: radial-gradient(ellipse, rgba(0,229,255,0.04) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
  transition: all 0.8s ease;
}
.darkroom-mode body::after {
  background: radial-gradient(ellipse, rgba(255,0,0,0.05) 0%, transparent 70%);
}
.light-mode body::after {
  background: radial-gradient(ellipse, rgba(0,151,167,0.04) 0%, transparent 70%);
}

/* ─── SAFELIGHT & VIGNETTE ─── */
.safelight-overlay {
  position: fixed; inset: 0;
  background: rgba(120,0,0,0.08);
  pointer-events: none; z-index: 900;
  opacity: 0; transition: opacity 0.8s ease;
  mix-blend-mode: multiply;
}
.darkroom-mode .safelight-overlay { opacity: 1; }

.vignette {
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.5) 100%);
  pointer-events: none; z-index: 1;
}
.light-mode .vignette { background: none; }

/* ─── SIDEBAR ─── */
.sidebar {
  position: fixed;
  left: 0; top: 0; bottom: 0;
  width: var(--sidebar-width);
  background: rgba(11,15,20,0.95);
  backdrop-filter: blur(20px);
  border-right: 1px solid var(--border);
  z-index: 200;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  overflow-x: hidden;
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
  scrollbar-width: thin;
  scrollbar-color: var(--border-bright) transparent;
}
.light-mode .sidebar {
  background: rgba(240,242,245,0.97);
}
.darkroom-mode .sidebar {
  background: rgba(13,0,0,0.97);
}

.sidebar-header {
  padding: 20px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.logo {
  display: flex; align-items: center; gap: 12px;
}
.logo-mark {
  width: 32px; height: 32px;
  border: 1.5px solid var(--accent);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  position: relative; flex-shrink: 0;
}
.logo-mark::after {
  content: '';
  width: 10px; height: 10px;
  background: var(--accent);
  border-radius: 50%;
  animation: pulse-dot 3s ease-in-out infinite;
}
@keyframes pulse-dot {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.6); }
}
.logo-text {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 22px; font-weight: 700;
  color: var(--white); letter-spacing: -0.02em;
}
.logo-sub {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; font-weight: 300;
  letter-spacing: 0.15em; color: var(--text-dim);
  text-transform: uppercase; display: block; margin-top: 2px;
}

.sidebar-search {
  padding: 16px 16px 12px; flex-shrink: 0;
}
.sidebar-search input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  outline: none;
  transition: all 0.2s ease;
}
.sidebar-search input::placeholder { color: var(--text-faint); }
.sidebar-search input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
  background: var(--surface-hover);
}

.sidebar-nav {
  flex: 1; padding: 8px 0; overflow-y: auto;
}
.sidebar-section-title {
  font-size: 9px; letter-spacing: 0.25em;
  text-transform: uppercase; color: var(--text-faint);
  padding: 16px 20px 6px; font-weight: 600;
}
.sidebar-item {
  width: 100%; text-align: left;
  padding: 9px 20px 9px 20px;
  background: transparent; border: none;
  border-left: 3px solid transparent;
  color: var(--text-dim);
  font-family: 'Inter', sans-serif;
  font-size: 13px; cursor: pointer;
  transition: all 0.15s ease;
  display: flex; align-items: center; gap: 10px;
}
.sidebar-item:hover {
  background: rgba(0,229,255,0.04);
  color: var(--text);
}
.sidebar-item.active {
  background: rgba(0,229,255,0.08);
  border-left-color: var(--accent);
  color: var(--accent);
  font-weight: 500;
}
.light-mode .sidebar-item:hover { background: rgba(0,151,167,0.06); }
.light-mode .sidebar-item.active {
  background: rgba(0,151,167,0.08);
  border-left-color: var(--accent);
  color: var(--accent);
}
.darkroom-mode .sidebar-item:hover { background: rgba(255,0,0,0.06); }
.darkroom-mode .sidebar-item.active {
  background: rgba(255,51,51,0.1);
  border-left-color: var(--accent);
  color: var(--accent);
}

.sidebar-icon {
  font-size: 14px; width: 18px;
  text-align: center; flex-shrink: 0;
  opacity: 0.6;
}
.sidebar-item.active .sidebar-icon { opacity: 1; }

.sidebar-footer {
  padding: 16px; border-top: 1px solid var(--border);
  display: flex; gap: 8px; flex-shrink: 0;
}
.sidebar-footer button {
  flex: 1; padding: 8px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 6px; color: var(--text-dim);
  font-family: 'Inter', sans-serif;
  font-size: 11px; cursor: pointer;
  transition: all 0.2s ease;
}
.sidebar-footer button:hover {
  color: var(--text); border-color: var(--border-bright);
  background: var(--surface-hover);
}

.sidebar-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.6); z-index: 199;
  backdrop-filter: blur(4px);
}
.sidebar-overlay.open { display: block; }

/* ─── MAIN CONTENT ─── */
.main-content {
  margin-left: var(--sidebar-width);
  min-height: 100vh; position: relative; z-index: 2;
}

/* ─── TOP BAR ─── */
.top-bar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center;
  padding: 0 28px; height: 56px;
  background: rgba(11,15,20,0.9);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}
.light-mode .top-bar { background: rgba(240,242,245,0.92); }
.darkroom-mode .top-bar { background: rgba(13,0,0,0.94); }

.top-bar-title {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 15px; font-weight: 600;
  color: var(--text); letter-spacing: 0.02em;
}
.hamburger-btn {
  display: none;
  align-items: center; justify-content: center;
  width: 36px; height: 36px;
  border: 1px solid var(--border); border-radius: 8px;
  background: transparent; color: var(--text-dim);
  font-size: 18px; cursor: pointer;
  margin-right: 12px; flex-shrink: 0;
  transition: all 0.15s ease;
}
.hamburger-btn:hover { border-color: var(--border-bright); color: var(--text); }

.top-bar-actions {
  margin-left: auto;
  display: flex; align-items: center; gap: 8px;
}

/* ─── BUTTONS ─── */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px; border-radius: 8px;
  font-family: 'Inter', sans-serif;
  font-size: 12px; font-weight: 500;
  cursor: pointer; transition: all 0.2s ease;
  border: none; text-decoration: none;
}
.btn-ghost {
  background: transparent; color: var(--text-dim);
  border: 1px solid var(--border);
}
.btn-ghost:hover {
  color: var(--text); border-color: var(--border-bright);
  background: var(--surface);
  transform: translateY(-1px);
}
.btn-primary {
  background: var(--accent); color: #0b0f14;
  font-weight: 600;
}
.btn-primary:hover {
  filter: brightness(1.1);
  transform: translateY(-1px);
  box-shadow: 0 4px 20px var(--accent-glow);
}
.btn-darkroom {
  background: transparent; color: var(--red);
  border: 1px solid rgba(255,68,68,0.3);
  font-size: 11px;
}
.btn-darkroom:hover, .btn-darkroom.active {
  background: var(--red-glow);
  border-color: var(--red);
  box-shadow: 0 0 16px rgba(255,68,68,0.15);
}

/* ─── HERO BAR ─── */
.hero-bar {
  padding: 32px 28px 24px; position: relative; overflow: hidden;
}
.hero-bar::before {
  content: 'FORMULAE';
  position: absolute; right: -10px; top: 50%;
  transform: translateY(-50%);
  font-family: 'Space Grotesk', sans-serif;
  font-size: 120px; font-weight: 700;
  color: transparent;
  -webkit-text-stroke: 1px rgba(0,229,255,0.05);
  pointer-events: none; letter-spacing: -0.04em;
  user-select: none;
}
.hero-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; font-weight: 400;
  letter-spacing: 0.3em; color: var(--accent-dim);
  text-transform: uppercase; margin-bottom: 10px;
}
.hero-count {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 48px; font-weight: 700;
  line-height: 1; color: var(--white);
  letter-spacing: -0.03em;
  display: flex; align-items: baseline; gap: 12px;
}
.hero-count span {
  font-family: 'Inter', sans-serif;
  font-size: 13px; font-weight: 400;
  color: var(--text-dim);
}
.hero-line {
  width: 50px; height: 2px;
  background: linear-gradient(90deg, var(--accent), transparent);
  margin-top: 16px; border-radius: 1px;
}

/* ─── GRID ─── */
.grid-container {
  padding: 20px 28px 80px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 16px;
}
.grid-container.list-view {
  grid-template-columns: 1fr; gap: 8px;
}

/* ─── FORMULA CARD (Glass Panel) ─── */
.formula-card {
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.35);
  padding: 22px;
  cursor: pointer; position: relative;
  overflow: hidden;
  transition: all 0.2s ease;
  opacity: 0; transform: translateY(12px);
  animation: card-in 0.4s cubic-bezier(0.4,0,0.2,1) forwards;
}
.formula-card:nth-child(1) { animation-delay: 0.03s; }
.formula-card:nth-child(2) { animation-delay: 0.06s; }
.formula-card:nth-child(3) { animation-delay: 0.09s; }
.formula-card:nth-child(4) { animation-delay: 0.12s; }
.formula-card:nth-child(5) { animation-delay: 0.15s; }
.formula-card:nth-child(6) { animation-delay: 0.18s; }
.formula-card:nth-child(7) { animation-delay: 0.21s; }
.formula-card:nth-child(8) { animation-delay: 0.24s; }

@keyframes card-in {
  to { opacity: 1; transform: translateY(0); }
}

.formula-card:hover {
  transform: translateY(-2px);
  border-color: rgba(0,229,255,0.15);
  box-shadow: 0 12px 40px rgba(0,0,0,0.5);
  background: rgba(255,255,255,0.09);
}
.light-mode .formula-card {
  background: rgba(255,255,255,0.7);
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  border-color: rgba(0,0,0,0.08);
}
.light-mode .formula-card:hover {
  background: rgba(255,255,255,0.9);
  box-shadow: 0 8px 30px rgba(0,0,0,0.12);
  border-color: rgba(0,151,167,0.2);
}

.card-accent {
  position: absolute; left: 0; top: 0; bottom: 0;
  width: 3px; border-radius: 3px 0 0 3px;
}
.card-header {
  display: flex; align-items: flex-start;
  justify-content: space-between; margin-bottom: 12px;
}
.card-process {
  font-size: 10px; letter-spacing: 0.2em;
  color: var(--text-faint); text-transform: uppercase;
  font-family: 'JetBrains Mono', monospace;
}
.card-status {
  font-size: 9px; letter-spacing: 0.1em;
  padding: 3px 8px; border-radius: 4px;
  text-transform: uppercase;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 500;
}
.status-tested {
  color: var(--green);
  border: 1px solid rgba(0,230,118,0.3);
  background: rgba(0,230,118,0.08);
}
.status-experimental {
  color: var(--orange);
  border: 1px solid rgba(255,171,64,0.3);
  background: rgba(255,171,64,0.08);
}
.status-archived {
  color: var(--text-faint);
  border: 1px solid var(--border);
  background: transparent;
}
.card-name {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 20px; font-weight: 600;
  color: var(--white); line-height: 1.2;
  margin-bottom: 4px; letter-spacing: -0.01em;
}
.card-category {
  font-size: 11px; color: var(--accent-dim);
  letter-spacing: 0.1em; text-transform: uppercase;
  margin-bottom: 14px;
}
.card-desc {
  font-size: 13px; color: var(--text-dim);
  line-height: 1.6; margin-bottom: 16px;
  font-style: italic;
}
.card-ingredients {
  display: flex; flex-wrap: wrap;
  gap: 6px; margin-bottom: 16px;
}
.ingredient-tag {
  font-size: 11px; padding: 3px 8px;
  border: 1px solid var(--border);
  border-radius: 4px; color: var(--text-faint);
  transition: all 0.15s ease;
}
.formula-card:hover .ingredient-tag {
  border-color: var(--border-bright); color: var(--text-dim);
}
.ingredient-tag.more {
  color: var(--accent-dim);
  border-color: rgba(0,229,255,0.15);
}
.card-footer {
  display: flex; align-items: center;
  justify-content: space-between;
  padding-top: 12px; border-top: 1px solid var(--border);
}
.card-meta { display: flex; gap: 16px; }
.card-meta-item {
  display: flex; flex-direction: column; gap: 2px;
}
.meta-label {
  font-size: 9px; letter-spacing: 0.2em;
  color: var(--text-faint); text-transform: uppercase;
}
.meta-value {
  font-size: 12px; color: var(--text-dim);
  font-family: 'JetBrains Mono', monospace;
}
.card-version {
  font-size: 10px; color: var(--text-faint);
  letter-spacing: 0.1em;
}

/* ─── LIST VIEW ─── */
.grid-container.list-view .formula-card {
  padding: 14px 22px;
  display: flex; flex-direction: row;
  align-items: center; gap: 16px;
  border-radius: 8px;
}
.grid-container.list-view .card-accent {
  position: absolute; left: 0; top: 0;
  width: 3px !important; height: 100% !important;
  border-radius: 3px 0 0 3px;
}
.grid-container.list-view .card-header {
  display: flex; align-items: center;
  gap: 10px; flex-shrink: 0; min-width: 90px;
  margin-bottom: 0;
}
.grid-container.list-view .card-name {
  font-size: 14px; flex: 1; min-width: 0;
  white-space: nowrap; overflow: hidden;
  text-overflow: ellipsis; margin: 0;
}
.grid-container.list-view .card-category,
.grid-container.list-view .card-desc,
.grid-container.list-view .card-ingredients { display: none; }
.grid-container.list-view .card-footer {
  border-top: none; padding-top: 0; flex-shrink: 0;
}
.grid-container.list-view .card-status { font-size: 8px; }

/* ─── EMPTY STATE ─── */
.empty-state {
  grid-column: 1 / -1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 80px 40px; text-align: center; gap: 12px;
  background: var(--surface);
  border-radius: 16px;
  border: 1px solid var(--border);
}
.empty-icon { font-size: 48px; opacity: 0.3; margin-bottom: 8px; }
.empty-title {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 22px; color: var(--text-dim);
}
.empty-sub { font-size: 12px; color: var(--text-faint); }

/* ─── MODAL ─── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(5,8,14,0.85);
  backdrop-filter: blur(8px);
  z-index: 500;
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s ease;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }

.modal {
  background: rgba(17,24,34,0.97);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border-bright);
  border-radius: 16px;
  width: 100%; max-width: 720px;
  max-height: 88vh; overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
  transform: translateY(16px) scale(0.98);
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
  position: relative;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
.light-mode .modal {
  background: rgba(255,255,255,0.97);
  box-shadow: 0 20px 60px rgba(0,0,0,0.15);
}
.darkroom-mode .modal {
  background: rgba(18,0,0,0.98);
}
.modal-overlay.open .modal {
  transform: translateY(0) scale(1);
}
.modal-header {
  padding: 28px 28px 20px;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0;
  background: inherit; z-index: 10;
  border-radius: 16px 16px 0 0;
}
.modal-eyebrow {
  font-size: 11px; letter-spacing: 0.2em;
  color: var(--accent-dim); text-transform: uppercase;
  margin-bottom: 6px; font-weight: 500;
}
.modal-title {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 28px; font-weight: 700;
  color: var(--white); letter-spacing: -0.02em;
}
.modal-close {
  position: absolute; top: 20px; right: 20px;
  width: 32px; height: 32px;
  border: 1px solid var(--border);
  border-radius: 8px; background: transparent;
  color: var(--text-dim); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; transition: all 0.15s ease;
}
.modal-close:hover {
  border-color: var(--border-bright);
  color: var(--text); background: var(--surface);
}
.modal-body { padding: 24px 28px 28px; }

/* ─── DETAIL SECTIONS ─── */
.detail-section { margin-bottom: 24px; }
.detail-section-label {
  font-size: 10px; letter-spacing: 0.2em;
  color: var(--accent-dim); text-transform: uppercase;
  margin-bottom: 10px; font-weight: 600;
  display: flex; align-items: center; gap: 10px;
}
.detail-section-label::after {
  content: ''; flex: 1; height: 1px;
  background: var(--border);
}
.detail-text {
  font-size: 14px; color: var(--text-dim);
  line-height: 1.7; font-style: italic;
}

/* ─── GLASS PANEL (for sections inside modal) ─── */
.glass-panel {
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(6px);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 10px;
  padding: 16px;
  margin-bottom: 12px;
}
.light-mode .glass-panel {
  background: rgba(0,0,0,0.02);
  border-color: rgba(0,0,0,0.06);
}

/* ─── INGREDIENT TABLE ─── */
.ingredient-table {
  width: 100%; border-collapse: collapse;
}
.ingredient-table tr {
  border-bottom: 1px solid var(--border);
  transition: background 0.15s ease;
}
.ingredient-table tr:last-child { border-bottom: none; }
.ingredient-table tr:hover { background: rgba(0,229,255,0.03); }
.light-mode .ingredient-table tr:hover { background: rgba(0,151,167,0.03); }
.ingredient-table th {
  text-align: left; font-size: 10px;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--text-faint); padding: 6px 0;
  font-weight: 500;
}
.ingredient-table td {
  padding: 10px 0; font-size: 14px;
}
.ingredient-table td:first-child {
  color: var(--text); font-weight: 600;
}
.ingredient-table td:last-child,
.ingredient-table td.qty-col {
  text-align: right; color: var(--accent-dim);
  font-variant-numeric: tabular-nums;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
}
.ingredient-table .scaled-col {
  color: var(--orange); font-weight: 600;
  text-align: right; font-variant-numeric: tabular-nums;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
}

/* ─── SCALE ROW ─── */
.scale-row {
  display: flex; align-items: center;
  gap: 10px; flex-wrap: wrap;
}
.scale-row label {
  margin: 0; white-space: nowrap;
  font-weight: 500; font-size: 13px; color: var(--text);
}
.scale-row input { width: 120px; }
.scale-row .scale-hint {
  font-size: 12px; color: var(--text-dim);
}

/* ─── DETAIL GRID (temp/time) ─── */
.detail-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
}
.detail-box {
  padding: 14px 16px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 8px;
}
.light-mode .detail-box {
  background: rgba(0,0,0,0.02);
}
.detail-box-label {
  font-size: 9px; letter-spacing: 0.2em;
  color: var(--text-faint); text-transform: uppercase;
  margin-bottom: 4px;
}
.detail-box-value {
  font-size: 15px; color: var(--text);
  font-family: 'JetBrains Mono', monospace;
}

/* ─── FORM INPUTS (shared style) ─── */
.form-input {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  outline: none;
  transition: all 0.2s ease;
  width: 100%;
}
.form-input::placeholder { color: var(--text-faint); }
.form-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}
select.form-input { cursor: pointer; }
textarea.form-input { resize: vertical; }

/* ─── CHEMISTRY ANALYSIS ─── */
.analysis-toggle {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 16px; padding: 12px 16px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px;
}
.analysis-toggle label {
  font-size: 13px; color: var(--text-dim); cursor: pointer;
  flex: 1;
}
.toggle-switch {
  position: relative; width: 40px; height: 22px;
  flex-shrink: 0;
}
.toggle-switch input {
  opacity: 0; width: 0; height: 0;
}
.toggle-slider {
  position: absolute; inset: 0;
  background: var(--surface-hover);
  border-radius: 22px; cursor: pointer;
  transition: all 0.2s ease;
  border: 1px solid var(--border);
}
.toggle-slider::before {
  content: ''; position: absolute;
  height: 16px; width: 16px;
  left: 2px; bottom: 2px;
  background: var(--text-dim);
  border-radius: 50%; transition: all 0.2s ease;
}
.toggle-switch input:checked + .toggle-slider {
  background: var(--accent-glow);
  border-color: var(--accent);
}
.toggle-switch input:checked + .toggle-slider::before {
  transform: translateX(18px);
  background: var(--accent);
}

.analysis-panel {
  display: none;
  animation: fadeIn 0.3s ease;
}
.analysis-panel.visible { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

.analysis-block {
  margin-bottom: 14px; padding: 14px;
  background: rgba(0,229,255,0.03);
  border: 1px solid rgba(0,229,255,0.08);
  border-radius: 8px;
}
.light-mode .analysis-block {
  background: rgba(0,151,167,0.04);
  border-color: rgba(0,151,167,0.1);
}
.analysis-label {
  font-size: 10px; letter-spacing: 0.15em;
  text-transform: uppercase; color: var(--accent);
  margin-bottom: 8px; font-weight: 600;
}
.analysis-value {
  font-size: 16px; font-weight: 600; color: var(--white);
  font-family: 'Space Grotesk', sans-serif;
}
.analysis-badge {
  display: inline-block; padding: 4px 12px;
  background: var(--accent-subtle); border: 1px solid rgba(0,229,255,0.15);
  border-radius: 6px; color: var(--accent);
  font-size: 13px; font-weight: 500;
}
.analysis-roles { display: flex; flex-direction: column; gap: 6px; }
.role-item {
  display: flex; align-items: center;
  gap: 8px; padding: 5px 0;
  font-size: 13px; flex-wrap: wrap;
}
.role-dot {
  width: 8px; height: 8px;
  border-radius: 50%; flex-shrink: 0;
}
.role-name { font-weight: 600; color: var(--text); }
.role-tag {
  font-size: 10px; padding: 2px 8px;
  border: 1px solid; border-radius: 4px;
  font-weight: 500;
}
.role-desc { color: var(--text-dim); font-size: 12px; }

.analysis-chars {
  list-style: none; padding: 0; margin: 0;
}
.analysis-chars li {
  padding: 4px 0; color: var(--text-dim); font-size: 13px;
}
.analysis-chars li::before {
  content: '▸ '; color: var(--accent);
}

.shelf-life-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px; margin-bottom: 6px;
}
.shelf-item { display: flex; flex-direction: column; gap: 3px; }
.shelf-label { font-size: 11px; color: var(--text-dim); }
.shelf-value {
  font-size: 14px; color: var(--text); font-weight: 500;
  font-family: 'JetBrains Mono', monospace;
}
.shelf-reason {
  font-size: 12px; color: var(--text-faint);
  font-style: italic;
}

/* ─── STATUS BAR ─── */
.status-bar {
  position: fixed; bottom: 0;
  left: var(--sidebar-width); right: 0;
  height: 30px;
  background: rgba(11,15,20,0.95);
  backdrop-filter: blur(12px);
  border-top: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 28px; gap: 20px; z-index: 100;
}
.light-mode .status-bar { background: rgba(240,242,245,0.95); }
.darkroom-mode .status-bar { background: rgba(13,0,0,0.95); }
.status-item {
  display: flex; align-items: center;
  gap: 6px; font-size: 10px;
  color: var(--text-faint); letter-spacing: 0.08em;
}
.status-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--green);
  animation: pulse-status 4s ease-in-out infinite;
}
@keyframes pulse-status {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}
.status-bar-right {
  margin-left: auto; display: flex; gap: 20px;
}

/* ─── AUTOCOMPLETE ─── */
.ac-dropdown {
  position: absolute;
  top: calc(100% + 3px); left: 0; right: 0;
  background: #141c28;
  border: 1px solid var(--border-bright);
  border-radius: 8px; z-index: 9000;
  max-height: 200px; overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
  display: none;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
.light-mode .ac-dropdown { background: #fff; }
.ac-dropdown.open { display: block; }
.ac-item {
  padding: 8px 12px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px; color: var(--text-dim);
  cursor: pointer;
  border-bottom: 1px solid var(--border);
  transition: background 0.1s ease;
}
.ac-item:last-child { border-bottom: none; }
.ac-item:hover, .ac-item.focused {
  background: var(--accent-subtle);
  color: var(--white);
}
.ac-item mark {
  background: transparent; color: var(--accent);
  font-weight: 600;
}

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 3px; }

/* ─── TOAST ─── */
.toast {
  position: fixed; bottom: 48px; left: 50%;
  transform: translateX(-50%) translateY(8px);
  background: rgba(17,24,34,0.95);
  backdrop-filter: blur(12px);
  border: 1px solid var(--border-bright);
  color: var(--accent);
  font-family: 'Inter', sans-serif;
  font-size: 12px; font-weight: 500;
  padding: 10px 20px; border-radius: 8px;
  z-index: 9999; opacity: 0;
  transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
  pointer-events: none; white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ─── MOBILE FAB ─── */
.mobile-fab {
  display: none; position: fixed;
  bottom: 48px; right: 16px;
  width: 52px; height: 52px;
  border-radius: 50%;
  background: var(--accent); color: #0b0f14;
  border: none; font-size: 24px; font-weight: 700;
  align-items: center; justify-content: center;
  cursor: pointer; z-index: 300;
  box-shadow: 0 4px 20px var(--accent-glow);
  transition: all 0.2s ease;
}
.mobile-fab:active { transform: scale(0.92); }

/* ─── DARKROOM ENHANCEMENTS ─── */
.darkroom-mode .formula-card { font-size: 15px; }
.darkroom-mode .card-name { font-size: 24px; }
.darkroom-mode .ingredient-table td { font-size: 16px; padding: 12px 0; }
.darkroom-mode .modal-title { font-size: 32px; }
.darkroom-mode .detail-text { font-size: 16px; }
.darkroom-mode .detail-box-value { font-size: 18px; }

/* ─── PART LABELS ─── */
.part-header {
  font-size: 9px; letter-spacing: 0.2em;
  text-transform: uppercase;
  padding: 5px 10px; margin-bottom: 0;
  font-family: 'JetBrains Mono', monospace;
  border-left: 2px solid;
}

/* ─── RESPONSIVE ─── */
@media (max-width: 768px) {
  .sidebar {
    transform: translateX(-100%); z-index: 300;
  }
  .sidebar.open { transform: translateX(0); }
  .main-content { margin-left: 0; }
  .status-bar { left: 0; }
  .hamburger-btn { display: flex; }
  .mobile-fab { display: flex; }
  .top-bar-actions .btn-primary { display: none; }

  .hero-bar { padding: 20px 16px 16px; }
  .hero-count { font-size: 36px; gap: 8px; }
  .hero-count span { font-size: 11px; }
  .hero-title { font-size: 10px; margin-bottom: 6px; }
  .hero-bar::before { font-size: 50px; }

  .grid-container {
    padding: 12px; gap: 12px;
    grid-template-columns: 1fr;
  }
  .formula-card { padding: 16px; }
  .card-name { font-size: 18px; }

  .top-bar { padding: 0 12px; height: 52px; }
  .top-bar-actions { gap: 4px; }
  .top-bar-actions .btn { padding: 6px 10px; font-size: 10px; }

  .modal-overlay { padding: 8px; }
  .modal { max-height: 94vh; border-radius: 12px; }
  .modal-header { padding: 20px 16px 16px; }
  .modal-title { font-size: 22px; }
  .modal-close { top: 14px; right: 14px; }
  .modal-body { padding: 16px; }
  .detail-grid { grid-template-columns: 1fr; gap: 8px; }
  .scale-row input { width: 90px; }
  .shelf-life-grid { grid-template-columns: 1fr; }

  .status-bar { padding: 0 12px; height: 28px; gap: 10px; }
  .status-item { font-size: 9px; }

  .toast { bottom: 40px; font-size: 11px; padding: 8px 16px; }
}

@media (max-width: 480px) {
  .hero-count { font-size: 28px; }
  .hero-bar::before { display: none; }
  .modal-overlay { padding: 0; }
  .modal { max-height: 100vh; border-radius: 0; max-width: 100%; }
  .top-bar-actions .btn-ghost { display: none; }
  .top-bar-actions .btn-darkroom { padding: 6px 8px; font-size: 9px; }
}
</style>
</head>

// ─── CHEMISTRY ANALYSIS ENGINE ───
function analyzeFormula(f) {
  const ings = f.ingredients || [];
  const analysis = {
    developerType: null,
    roles: [],
    characteristics: [],
    shelfLife: { stock: '', working: '', reason: '' },
    classification: ''
  };

  ings.forEach(ing => {
    const nameLower = (ing.name || '').toLowerCase();
    for (const [key, info] of Object.entries(CHEMICAL_ROLES)) {
      if (nameLower.includes(key)) {
        analysis.roles.push({ name: ing.name, ...info });
        break;
      }
    }
  });

  const hasMetol = ings.some(i => /metol|elon/i.test(i.name));
  const hasHQ = ings.some(i => /hydroquinone/i.test(i.name));
  const hasPhenidone = ings.some(i => /phenidone|dimezone/i.test(i.name));
  const hasPyro = ings.some(i => /pyro|catechol/i.test(i.name));
  const hasAscorbic = ings.some(i => /ascorbic/i.test(i.name));
  const hasCD = ings.some(i => /cd-[0-9]/i.test(i.name));

  if (f.category === 'Developer') {
    if (hasPyro) {
      analysis.developerType = 'Staining Developer';
      analysis.classification = 'Staining developer';
      analysis.characteristics = ['UV-blocking stain for alt process printing', 'Pronounced grain structure', 'Excellent tonal separation', 'Self-masking highlight control'];
    } else if (hasMetol && hasHQ) {
      analysis.developerType = 'MQ Developer (Metol + Hydroquinone)';
      analysis.classification = 'MQ developer';
      analysis.characteristics = ['Medium contrast', 'Fine grain', 'Good shadow detail', 'Reliable and predictable'];
    } else if (hasPhenidone && hasHQ) {
      analysis.developerType = 'PQ Developer (Phenidone + Hydroquinone)';
      analysis.classification = 'PQ developer';
      analysis.characteristics = ['High activity', 'Long shelf life', 'Economical', 'Good film speed'];
    } else if (hasMetol && !hasHQ) {
      analysis.developerType = 'Metol-only Developer';
      analysis.classification = 'Fine grain developer';
      analysis.characteristics = ['Very fine grain', 'Soft tonality', 'Lower contrast', 'Excellent for portraits'];
    } else if (hasAscorbic) {
      analysis.developerType = 'Ascorbic Acid Developer';
      analysis.classification = 'Eco-friendly developer';
      analysis.characteristics = ['Environmentally friendly', 'Good acutance', 'Moderate contrast'];
    } else if (hasCD) {
      analysis.developerType = 'Color Developer';
      analysis.classification = 'Chromogenic developer';
      analysis.characteristics = ['Produces color dye image', 'Temperature critical', 'Precise timing required'];
    } else {
      analysis.developerType = 'General Developer';
      analysis.classification = 'Developer';
      analysis.characteristics = ['Standard development characteristics'];
    }

    if (hasPyro) {
      analysis.shelfLife = { stock: '~3 months in concentrate', working: '~30 minutes (one-shot)', reason: 'Pyrocatechol oxidizes rapidly once diluted' };
    } else if (hasCD) {
      analysis.shelfLife = { stock: '~8 weeks in concentrate', working: '~6 hours at working temp', reason: 'CD-4 is air-sensitive; cap immediately' };
    } else if (hasMetol) {
      analysis.shelfLife = { stock: '~6 months in airtight bottle', working: '~8 hours', reason: 'Metol oxidizes quickly once diluted' };
    } else {
      analysis.shelfLife = { stock: '~6 months sealed', working: '~24 hours', reason: 'Standard oxidation of developing agents' };
    }
  } else if (f.category === 'Fixer') {
    analysis.classification = 'Fixing solution';
    const hasAmmonium = ings.some(i => /ammonium thiosulfate/i.test(i.name));
    if (hasAmmonium) {
      analysis.characteristics = ['Rapid fixing action', 'Shorter wash times', 'Higher capacity'];
      analysis.shelfLife = { stock: '~2 months', working: '~1 month', reason: 'Ammonium thiosulfate has moderate shelf life' };
    } else {
      analysis.characteristics = ['Standard fixing action', 'Good archival properties'];
      analysis.shelfLife = { stock: '~6 months', working: '~1 month', reason: 'Sodium thiosulfate is relatively stable' };
    }
  } else if (f.category === 'Bleach') {
    analysis.classification = 'Bleach solution';
    analysis.characteristics = ['Oxidizes metallic silver', 'May require re-fixing after use'];
    analysis.shelfLife = { stock: '~3 months', working: '~1 week', reason: 'Oxidizing agents slowly decompose' };
  } else if (f.category === 'Silver nitrate bath') {
    analysis.classification = 'Sensitizing solution';
    analysis.characteristics = ['Forms light-sensitive silver halides', 'Handle under safelight only', 'Caustic — stains skin permanently'];
    analysis.shelfLife = { stock: '~12 months if maintained', working: 'N/A — continuous use', reason: 'Silver nitrate is stable if pH maintained' };
  } else {
    analysis.classification = f.category || 'Chemical solution';
    analysis.characteristics = ['See formula notes for details'];
    analysis.shelfLife = { stock: '~6 months sealed', working: 'Varies', reason: 'Depends on specific chemistry' };
  }

  return analysis;
}

        ${analysis.roles.map(r => `

            <span class="role-desc">— ${r.description}</span>

  }

  if (analysis.characteristics.length) {
    html += `<div class="analysis-block">

      <ul class="analysis-chars">
        ${analysis.characteristics.map(c => `<li>${c}</li>`).join('')}
      </ul>
    </div>`;
  }

  if (analysis.shelfLife.stock) {
    html += `<div class="analysis-block">
      <div class="analysis-label">Shelf Life Estimate</div>
      <div class="shelf-life-grid">
        <div class="shelf-item"><span class="shelf-label">Stock solution</span><span class="shelf-value">${analysis.shelfLife.stock}</span></div>

      </div>
      <div class="shelf-reason">${analysis.shelfLife.reason}</div>
    </div>`;
  }

  return html;
}

function renderGrid() {
  const grid = document.getElementById('grid');
  const search = document.getElementById('search').value.toLowerCase();
  let filtered = formulas.filter(f => {
    const matchProcess  = filters.process  === 'all' || f.process  === filters.process;
    const matchCategory = filters.category === 'all' || f.category === filters.category;
    const matchStatus   = filters.status   === 'all' || f.status   === filters.status;
    const matchSearch   = !search || f.name.toLowerCase().includes(search)
                        || (f.desc||'').toLowerCase().includes(search)
                        || f.ingredients.some(i => i.name.toLowerCase().includes(search));
    return matchProcess && matchCategory && matchStatus && matchSearch;
  });

  document.getElementById('hero-count').innerHTML =
    `${formulas.length} <span>${formulas.length === 1 ? 'formula' : 'formulas'} stored</span>`;

  document.getElementById('filter-status').textContent =
    filtered.length === formulas.length ? 'Showing all' : `Showing ${filtered.length} of ${formulas.length}`;

  if (filtered.length === 0) {
    grid.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">⊘</div>
        <div class="empty-title">No formulas found</div>
        <div class="empty-sub">Try adjusting your filters or add a new formula</div>
      </div>`;
    return;
  }

  grid.innerHTML = filtered.map((f, i) => {
    const statusClass = `status-${(f.status||'experimental').toLowerCase()}`;
    const ings = (f.ingredients || []).filter(ing => ing && (ing.name || ing));
    const ingredients = ings.slice(0, 3).map(ing => {
      const name = typeof ing === 'string' ? ing : (ing.name || '');
      return name ? `<span class="ingredient-tag">${name}</span>` : '';
    }).join('');
    const more = ings.length > 3
      ? `<span class="ingredient-tag more">+${ings.length - 3} more</span>` : '';
    return `

// ─── THEMES ───
let currentTheme = localStorage.getItem('formulae_theme') || 'dark';

function applyTheme(theme) {
  const app = document.getElementById('app');
  app.classList.remove('light-mode','darkroom-mode');
  const btn = document.getElementById('darkroom-btn');
  const themeBtn = document.getElementById('theme-btn');
  if (theme === 'light') {
    app.classList.add('light-mode');
    btn.classList.remove('active');
    btn.textContent = '⬤ Darkroom';
    themeBtn.textContent = '◑ Light';
  } else if (theme === 'darkroom') {
    app.classList.add('darkroom-mode');
    btn.classList.add('active');
    btn.textContent = '⬤ Exit Darkroom';
    themeBtn.textContent = '◑ Dark';
  } else {
    btn.classList.remove('active');
    btn.textContent = '⬤ Darkroom';
    themeBtn.textContent = '◑ Dark';
  }
  currentTheme = theme;
  localStorage.setItem('formulae_theme', theme);
}

function cycleTheme() {
  const order = ['dark','light','darkroom'];
  const next = order[(order.indexOf(currentTheme) + 1) % order.length];
  applyTheme(next);
}

function toggleDarkroom() {
  applyTheme(currentTheme === 'darkroom' ? 'dark' : 'darkroom');
}

const PART_PALETTE = {
  'Stock':   { color:'#00e5ff', bg:'rgba(0,229,255,0.08)' },
  'Part A':  { color:'#448aff', bg:'rgba(68,138,255,0.08)' },
  'Part B':  { color:'#ffab40', bg:'rgba(255,171,64,0.08)' },
  'Part C':  { color:'#00e676', bg:'rgba(0,230,118,0.08)' },
  'Part D':  { color:'#b388ff', bg:'rgba(179,136,255,0.08)' },
  'Replen.': { color:'#ff8a65', bg:'rgba(255,138,101,0.08)' },
  'Bleach':  { color:'#ffd54f', bg:'rgba(255,213,79,0.08)' },
  'Fix':     { color:'#80cbc4', bg:'rgba(128,203,196,0.08)' },
  'Wash':    { color:'#90a4ae', bg:'rgba(144,164,174,0.08)' },
};

function renderIngredientsByPart(ingredients) {
  const groups = {};
  const order  = [];
  ingredients.forEach(ing => {
    const p = ing.part || 'Stock';
    if (!groups[p]) { groups[p] = []; order.push(p); }
    groups[p].push(ing);
  });

  if (order.length === 1 && order[0] === 'Stock') {
    return `<div class="glass-panel"><table class="ingredient-table" id="ing-table-view">
      <thead><tr>
        <th style="text-align:left;">Chemical</th>
        <th style="text-align:right;">Quantity</th>
        <th class="scaled-col" id="scaled-header" style="display:none;">Scaled</th>
      </tr></thead>
      ${ingredients.map((ing, idx) => `
        <tr>
          <td><strong>${ing.name}</strong></td>
          <td style="text-align:right;color:var(--accent-dim);font-family:'JetBrains Mono',monospace;font-size:13px;">${ingAmount(ing)}${ing.unit && ing.unit !== 'to make' ? ' ' + ing.unit : (ing.unit === 'to make' ? ' — to make' : '')}</td>
          <td class="scaled-col" id="scaled-${idx}" style="display:none">—</td>
        </tr>`).join('')}
    </table></div>`;
  }

  let globalIdx = 0;
  return order.map(part => {
    const palette = PART_PALETTE[part] || { color:'#00e5ff', bg:'rgba(0,229,255,0.08)' };
    const rows = groups[part].map(ing => {
      const idx = globalIdx++;
      return `
      <tr>
        <td style="padding-left:12px;"><strong>${ing.name}</strong></td>
        <td style="text-align:right;color:${palette.color};opacity:0.85;font-variant-numeric:tabular-nums;font-family:'JetBrains Mono',monospace;font-size:13px;">
          ${ingAmount(ing)}${ing.unit && ing.unit !== 'to make' ? ' ' + ing.unit : (ing.unit === 'to make' ? ' — to make' : '')}
        </td>
        <td class="scaled-col" id="scaled-${idx}" style="display:none">—</td>
      </tr>`;
    }).join('');
    return `
      <div class="glass-panel" style="margin-bottom:8px;">
        <div class="part-header" style="color:${palette.color};background:${palette.bg};border-left-color:${palette.color};margin-bottom:8px;">
          ${part}
        </div>
        <table class="ingredient-table">${rows}</table>
      </div>`;
  }).join('');
}

function onPartChange() { updatePartHeaders(); }

function updatePartHeaders() {
  ingredientRows.forEach(id => {
    const sel = document.getElementById(`ing-part-${id}`);
    const row = document.getElementById(`ing-row-${id}`);
    if (sel && row) {
      const col = PART_COLORS[sel.value] || '#00e5ff';

      sel.style.borderColor = col + '44';
      row.style.borderLeft = `2px solid ${col}33`;

function removeIngredientRow(id) {
  document.getElementById(`ing-row-${id}`)?.remove();

function saveFormula() {
  const name = document.getElementById('nf-name').value.trim();
  const process = document.getElementById('nf-process').value;
  const category = document.getElementById('nf-category').value;
  if (!name || !process || !category) {
    alert('Please fill in Name, Process, and Category.');
    return;
  }
  const ings = ingredientRows.map(id => ({
    name:   document.getElementById(`ing-name-${id}`)?.value.trim() || '',
    amount: document.getElementById(`ing-amt-${id}`)?.value.trim()  || '',
    unit:   document.getElementById(`ing-unit-${id}`)?.value        || 'g',
    part:   document.getElementById(`ing-part-${id}`)?.value        || 'Stock',
  })).filter(i => i.name);

  if (editingId) {
    const idx = formulas.findIndex(x => x.id === editingId);
    if (idx !== -1) {
      formulas[idx] = { ...formulas[idx], name, process, category,
        status: document.getElementById('nf-status').value,
        version: document.getElementById('nf-version').value || '1.0',
        desc: document.getElementById('nf-desc').value.trim(),
        ingredients: ings,
        temp: document.getElementById('nf-temp').value.trim(),
        time: document.getElementById('nf-time').value.trim(),
        notes: document.getElementById('nf-notes').value.trim(),
        updated: new Date().toISOString().split('T')[0]
      };
    }
    learnChemicals(ings);
    localStorage.setItem('formulae_data', JSON.stringify(formulas));
    editingId = null;
    closeNewModal();
    renderGrid();
    showToast('✓ Formula updated');
    return;
  }

  const colors = ['#00e5ff','#ffab40','#b388ff','#00e676','#ff4081','#78909c','#ffd54f'];
  const formula = {
    id: Date.now(), name, process, category,
    status: document.getElementById('nf-status').value,
    version: document.getElementById('nf-version').value || '1.0',
    desc: document.getElementById('nf-desc').value.trim(),
    ingredients: ings,
    temp: document.getElementById('nf-temp').value.trim(),
    time: document.getElementById('nf-time').value.trim(),
    notes: document.getElementById('nf-notes').value.trim(),
    color: colors[formulas.length % colors.length],
    updated: new Date().toISOString().split('T')[0]
  };
  formulas.unshift(formula);
  learnChemicals(formula.ingredients);
  localStorage.setItem('formulae_data', JSON.stringify(formulas));
  updateBackupStatus();
  closeNewModal();
  renderGrid();
}

// ─── DELETE ───
function deleteFormula(id) {
  if (!confirm('Delete this formula? This cannot be undone.')) return;
  formulas = formulas.filter(f => f.id !== id);
  localStorage.setItem('formulae_data', JSON.stringify(formulas));
  closeViewModal();
  renderGrid();
}

// ─── COPY ───
function copyFormulaToClipboard(id) {
  const f = formulas.find(x => x.id === id);
  if (!f) return;
  const ings = f.ingredients || [];
  let text = f.name + '\n';
  text += f.process + ' · ' + f.category + ' · v' + (f.version || '1.0') + '\n';
  if (f.desc) text += '\n' + f.desc + '\n';
  if (ings.length) {
    text += '\nIngredients:\n';
    ings.forEach(ing => {
      const part = ing.part && ing.part !== 'Stock' ? ' [' + ing.part + ']' : '';
      text += '  ' + ing.name + ' — ' + ingAmount(ing) + (ing.unit ? ' ' + ing.unit : '') + part + '\n';
    });
  }
  if (f.temp) text += '\nTemperature: ' + f.temp;
  if (f.time) text += '\nTime: ' + f.time;
  if (f.notes) text += '\n\nNotes: ' + f.notes;
  navigator.clipboard.writeText(text).then(() => {
    showToast('✓ Formula copied to clipboard');
  }).catch(() => {
    showToast('⚠ Could not copy — try again');
  });
}

// ─── EXPORT JSON ───
function exportJSON() {
  const blob = new Blob([JSON.stringify(formulas, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `formulae-backup-${new Date().toISOString().split('T')[0]}.json`;
  a.click();
  localStorage.setItem('formulae_lastbackup', new Date().toISOString());
  updateBackupStatus();
}

// ─── IMPORT ───
function triggerImport() {
  document.getElementById('import-file-input').value = '';
  document.getElementById('import-file-input').click();
}

function importJSON(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (!Array.isArray(data)) throw new Error('Invalid format');
      const valid = data.filter(f => f.name && f.process && f.category);
      if (valid.length === 0) throw new Error('No valid formulas found');

      const existing = formulas.map(f => f.name.toLowerCase());
      const newOnes  = valid.filter(f => !existing.includes(f.name.toLowerCase()));
      const dupes    = valid.length - newOnes.length;

      const msg = dupes > 0
        ? `Import ${newOnes.length} new formula(s)? (${dupes} duplicate(s) skipped)`
        : `Import ${newOnes.length} formula(s)?`;

      if (!confirm(msg)) return;

      newOnes.forEach(f => { f.id = Date.now() + Math.random(); });
      formulas = [...newOnes, ...formulas];
      newOnes.forEach(f => learnChemicals(f.ingredients || []));
      localStorage.setItem('formulae_data', JSON.stringify(formulas));
      localStorage.setItem('formulae_lastbackup', new Date().toISOString());
      updateBackupStatus();
      renderGrid();
      showToast(`✓ Imported ${newOnes.length} formula${newOnes.length !== 1 ? 's' : ''}`);
    } catch (err) {
      alert('Could not read file. Make sure it is a valid Formulae JSON backup.');
    }
  };
  reader.readAsText(file);
}

// ─── SCALE RECIPE ───
function scaleRecipe() {
  const targetVol = parseFloat(document.getElementById('scale-volume').value);
  const f = currentViewId ? formulas.find(x => x.id === currentViewId) : null;
  if (!f) return;

  const ings = f.ingredients || [];
  if (!targetVol || targetVol <= 0) { clearScale(); return; }

  function isToMake(i) {
    return (i.unit || '').toLowerCase() === 'to make' ||
      (i.name || '').toLowerCase().includes('to make');
  }

  function toMl(i) {
    const unit = (i.unit || '').toLowerCase().replace(/to make/g, '').trim();
    const n = parseFloat(ingAmount(i));
    if (isNaN(n)) return 0;
    if (unit === 'ml') return n;
    if (unit === 'l') return n * 1000;
    return 0;
  }

  const partGroups = {};
  ings.forEach(i => {
    const part = i.part || '_default';
    if (!partGroups[part]) partGroups[part] = { makeUpMl: 0, liquidMl: 0, hasToMake: false };
    const ml = toMl(i);
    if (ml > 0) {
      if (isToMake(i)) {
        // Use the largest "to make" volume in case there are multiple; it defines the final volume for the part
        if (ml > partGroups[part].makeUpMl) partGroups[part].makeUpMl = ml;
        partGroups[part].hasToMake = true;
      } else {
        partGroups[part].liquidMl += ml;
      }
    }
  });

  const DEFAULT_BASE_ML = 1000;
  const partBaseMl = {};
  for (const [partKey, g] of Object.entries(partGroups)) {
    let base = g.hasToMake ? g.makeUpMl : g.liquidMl;
    if (base <= 0) base = DEFAULT_BASE_ML;
    partBaseMl[partKey] = targetVol / base;
  }

  document.querySelectorAll('.scaled-col').forEach(el => el.style.display = '');

  ings.forEach((i, idx) => {
    const cell = document.getElementById('scaled-' + idx);
    if (!cell) return;
    cell.style.display = '';
    const partKey = i.part || '_default';
    const factor = partBaseMl[partKey] ?? (targetVol / DEFAULT_BASE_ML);
    const n = parseFloat(ingAmount(i));
    if (!isNaN(n)) {
      const scaled = n * factor;
      const formatted = scaled < 0.01 ? scaled.toExponential(2) : Number(scaled.toFixed(4));
      cell.textContent = formatted + ' ' + (i.unit || '');
    } else {
      cell.textContent = ingAmount(i);
    }
  });
}

function clearScale() {
  document.querySelectorAll('.scaled-col').forEach(el => {
    el.style.display = 'none';
    if (el.tagName !== 'TH') el.textContent = '—';
  });
  const inp = document.getElementById('scale-volume');
  if (inp) inp.value = '';
}

    const pageH = pdf.internal.pageSize.getHeight();
    const margin = 15;
    const usable = pageW - margin * 2;
    const imgData = canvas.toDataURL('image/png');
    const ratio = canvas.height / canvas.width;
    const imgW = usable;
    const imgH = imgW * ratio;
    const availH = pageH - margin * 2;

}

function getChemicalLibrary() {
  const learned = JSON.parse(localStorage.getItem('formulae_chemicals') || '[]');
  const learnedSet = new Set(learned.map(s => s.toLowerCase()));
  const seeds = SEED_CHEMICALS.filter(s => !learnedSet.has(s.toLowerCase()));
  return [...learned, ...seeds];
}

function learnChemicals(ingredients) {
  const existing = JSON.parse(localStorage.getItem('formulae_chemicals') || '[]');
  const existingLower = new Set(existing.map(s => s.toLowerCase()));
  const newOnes = ingredients
    .map(i => i.name.trim())
    .filter(n => n.length > 1 && !existingLower.has(n.toLowerCase()));
  if (newOnes.length) {
    localStorage.setItem('formulae_chemicals', JSON.stringify([...newOnes, ...existing]));
  }
}

function learnFromExistingFormulas() {
  formulas.forEach(f => learnChemicals(f.ingredients || []));
}

let acFocus = {};

function chemAutocomplete(input, rowId) {
  const query = input.value.trim();
  const dd = document.getElementById(`ac-${rowId}`);
  if (!query || query.length < 2) { hideAC(rowId); return; }

  const q = query.toLowerCase();
  const lib = getChemicalLibrary();
  const matches = lib.filter(c => c.toLowerCase().includes(q)).slice(0, 12);

  if (!matches.length) { hideAC(rowId); return; }

  acFocus[rowId] = -1;
  dd.innerHTML = matches.map((c, i) => {
    const idx = c.toLowerCase().indexOf(q);
    const hi = idx >= 0
      ? c.slice(0,idx) + '<mark>' + c.slice(idx, idx+q.length) + '</mark>' + c.slice(idx+q.length)
      : c;
    return `<div class="ac-item" data-val="${c.replace(/"/g,'&quot;')}" data-i="${i}"
      onmousedown="pickAC(event,'${rowId}')">${hi}</div>`;
  }).join('');

  dd.classList.add('open');
}

function chemKeydown(e, rowId) {
  const dd = document.getElementById(`ac-${rowId}`);
  if (!dd.classList.contains('open')) return;
  const items = dd.querySelectorAll('.ac-item');
  if (!items.length) return;

  if (e.key === 'ArrowDown') {
    e.preventDefault();
    acFocus[rowId] = Math.min((acFocus[rowId] ?? -1) + 1, items.length - 1);
    items.forEach((el,i) => el.classList.toggle('focused', i === acFocus[rowId]));
    items[acFocus[rowId]]?.scrollIntoView({ block:'nearest' });
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    acFocus[rowId] = Math.max((acFocus[rowId] ?? 0) - 1, 0);
    items.forEach((el,i) => el.classList.toggle('focused', i === acFocus[rowId]));
    items[acFocus[rowId]]?.scrollIntoView({ block:'nearest' });
  } else if (e.key === 'Enter' || e.key === 'Tab') {
    const focused = dd.querySelector('.ac-item.focused') || items[0];
    if (focused) {
      e.preventDefault();
      const input = document.getElementById(`ing-name-${rowId}`);
      input.value = focused.dataset.val;
      hideAC(rowId);
      document.getElementById(`ing-amt-${rowId}`)?.focus();
    }
  } else if (e.key === 'Escape') {
    hideAC(rowId);
  }
}

function pickAC(e, rowId) {
  e.preventDefault();
  const val = e.currentTarget.dataset.val;
  document.getElementById(`ing-name-${rowId}`).value = val;
  hideAC(rowId);
  document.getElementById(`ing-amt-${rowId}`)?.focus();
}

function hideAC(rowId) {
  document.getElementById(`ac-${rowId}`)?.classList.remove('open');
}
