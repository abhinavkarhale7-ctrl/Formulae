<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Formulae — Film Lab Chemical Database</title>
  <meta name="description" content="Store, manage, search, and version-control your photographic chemical formulas — built for the darkroom." />
  <meta name="theme-color" content="#1e3a8a" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192x192.png" />
  <link rel="apple-touch-icon" href="icons/icon-192x192.png" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@4.2.0/dist/jspdf.umd.min.js"></script>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- ── HEADER ──────────────────────────────────────────────────── -->
<header>
  <div class="logo">
    <span class="logo-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="2" y="7" width="20" height="13" rx="2"/>
        <path d="M2 11h2m16 0h2M2 15h2m16 0h2"/>
        <circle cx="12" cy="13" r="2"/>
        <path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
      </svg>
    </span>
    Formulae<span class="logo-dot">.</span>
  </div>
  <div class="header-right">
    <button class="btn btn-sm" onclick="toggleDarkroom()" id="dr-btn" title="Toggle darkroom mode">
      <span id="dr-icon">🔴</span>
      <span id="dr-label">Darkroom</span>
    </button>
    <button class="btn btn-sm" onclick="exportData()" title="Export all formulas as JSON">↓ Export</button>
    <button class="btn btn-sm" onclick="printAll()" title="Print / save PDF of all visible formulas">↓ PDF</button>
    <label class="btn btn-sm" style="margin:0;cursor:pointer;" title="Import from JSON">
      ↑ Import <input type="file" accept=".json" style="display:none" onchange="importData(event)" />
    </label>
    <button class="btn btn-primary btn-sm" onclick="openModal()" title="New formula (press N)">+ New Formula</button>
    <span class="last-backup" id="last-backup">Last Backup: Never</span>
  </div>
</header>

<!-- ── LOCAL DATA WARNING BANNER ───────────────────────────────── -->
<div class="local-warning-banner">⚠ Your formulas are stored locally in this browser. Export regularly to avoid data loss.</div>

<!-- ── MAIN ────────────────────────────────────────────────────── -->
<main class="page" id="main-page">
  <!-- Stats -->
  <div class="stats-bar" id="stats-bar"></div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="search-wrapper">
      <span class="search-icon">🔍</span>
      <input
        type="search"
        id="search-input"
        placeholder="Search name, ingredient, notes… (/)"
        oninput="renderCards()"
        aria-label="Search formulas"
      />
    </div>
    <select id="filter-process" onchange="renderCards()" aria-label="Filter by process">
      <option value="">All processes</option>
      <option value="B&W">B&amp;W</option>
      <option value="C-41">C-41</option>
      <option value="ECN-2">ECN-2</option>
      <option value="E-6">E-6</option>
      <option value="Ambrotype">Ambrotype</option>
      <option value="Tintype">Tintype</option>
      <option value="Dryplate">Dryplate</option>
      <option value="Fixer">Fixer</option>
      <option value="Other">Other</option>
    </select>
    <select id="filter-category" onchange="renderCards()" aria-label="Filter by category">
      <option value="">All categories</option>
      <option value="Developer">Developer</option>
      <option value="Stop Bath">Stop Bath</option>
      <option value="Fixer">Fixer</option>
      <option value="Bleach">Bleach</option>
      <option value="Stabilizer">Stabilizer</option>
      <option value="Collodion">Collodion</option>
      <option value="Silver nitrate bath">Silver nitrate bath</option>
      <option value="Varnish">Varnish</option>
      <option value="Toners">Toners</option>
      <option value="Other">Other</option>
    </select>
    <select id="filter-status" onchange="renderCards()" aria-label="Filter by status">
      <option value="">All statuses</option>
      <option value="Tested">Tested</option>
      <option value="Experimental">Experimental</option>
      <option value="Archived">Archived</option>
    </select>
    <select id="sort-select" onchange="renderCards()" aria-label="Sort by">
      <option value="updated">Recently updated</option>
      <option value="name">Name A–Z</option>
      <option value="process">Process</option>
      <option value="version">Version ↓</option>
    </select>
    <button class="btn btn-ghost btn-sm" onclick="clearFilters()" title="Clear all filters">✕ Clear</button>
    <button class="btn btn-ghost btn-sm" id="view-toggle-btn" onclick="toggleView()" title="Toggle grid/list view">⊞ Grid</button>
    <div id="results-count" class="results-count"></div>
  </div>

  <!-- Cards grid -->
  <div class="cards-grid" id="cards-grid"></div>
  <div id="empty-state" class="empty" style="display:none"></div>
</main>

<!-- ── FOOTER ──────────────────────────────────────────────────── -->
<footer>&copy; 2026 Formulae &middot; Film Lab Chemical Database &middot; v1.1-dev</footer>

<!-- ── DETAIL PANEL ─────────────────────────────────────────────── -->
<div class="detail-panel" id="detail-panel">
  <div class="detail-inner">
    <div class="detail-back">
      <button class="btn btn-secondary btn-sm" onclick="closeDetail()">← Back</button>
      <button class="btn btn-secondary btn-sm" onclick="downloadDetailPDF()" title="Download as PDF">⬇ PDF</button>
      <button class="btn btn-secondary btn-sm" onclick="downloadDetailJPEG()" title="Download as JPEG">⬇ JPEG</button>
    </div>
    <div id="detail-content"></div>
  </div>
</div>

<!-- ── FORMULA MODAL ────────────────────────────────────────────── -->
<div class="modal-backdrop" id="modal-backdrop" onclick="backdropClose(event)">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">New Formula</span>
      <button class="btn btn-ghost btn-sm" onclick="closeModal()" aria-label="Close">✕</button>
    </div>
    <div class="modal-body" id="modal-body">
      <input type="hidden" id="edit-id" />

      <div>
        <label for="f-name">Formula Name *</label>
        <input id="f-name" type="text" placeholder="e.g. HC-110 Dilution B" required />
      </div>

      <div class="form-row">
        <div>
          <label for="f-process">Process *</label>
          <select id="f-process" required>
            <option value="">— select —</option>
            <option>B&W</option>
            <option>C-41</option>
            <option>ECN-2</option>
            <option>E-6</option>
            <option>Ambrotype</option>
            <option>Tintype</option>
            <option>Dryplate</option>
            <option>Fixer</option>
            <option>Other</option>
          </select>
        </div>
        <div>
          <label for="f-category">Category *</label>
          <select id="f-category" required>
            <option value="">— select —</option>
            <option>Developer</option>
            <option>Stop Bath</option>
            <option>Fixer</option>
            <option>Bleach</option>
            <option>Stabilizer</option>
            <option>Collodion</option>
            <option>Silver nitrate bath</option>
            <option>Varnish</option>
            <option>Toners</option>
            <option>Other</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div>
          <label for="f-status">Status</label>
          <select id="f-status">
            <option>Experimental</option>
            <option>Tested</option>
            <option>Archived</option>
          </select>
        </div>
        <div>
          <label for="f-version">Version</label>
          <input id="f-version" type="text" placeholder="e.g. 1.0" value="1.0" />
        </div>
      </div>

      <div>
        <label for="f-color">Formula Color</label>
        <input id="f-color" type="color" value="#2563eb" style="width:60px;height:2rem;padding:2px;cursor:pointer" />
      </div>

      <div>
        <label for="f-desc">Description</label>
        <textarea id="f-desc" placeholder="Short description…"></textarea>
      </div>

      <!-- Ingredient editor -->
      <div>
        <label>Ingredients</label>
        <div class="ing-editor" id="ing-editor">
          <!-- header rebuilt by clearIngEditor() -->
        </div>
        <button class="add-ing-btn" onclick="addIngRow()">+ Add ingredient</button>
      </div>

      <div>
        <label for="f-temp">Temperature / Conditions</label>
        <input id="f-temp" type="text" placeholder="e.g. 38°C / 100°F" />
      </div>

      <div>
        <label for="f-time">Development Time</label>
        <input id="f-time" type="text" placeholder="e.g. 3:30 min at 1:1" />
      </div>

      <div>
        <label for="f-notes">Notes</label>
        <textarea id="f-notes" placeholder="Any special notes, warnings, tips…"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveFormula()" id="save-btn">Save formula</button>
    </div>
  </div>
</div>

<!-- ── CONFIRM DIALOG ───────────────────────────────────────────── -->
<div class="confirm-backdrop" id="confirm-backdrop">
  <div class="confirm-box">
    <h3 id="confirm-title">Delete formula?</h3>
    <p id="confirm-msg">This action cannot be undone.</p>
    <div class="confirm-btns">
      <button class="btn btn-secondary" onclick="closeConfirm()">Cancel</button>
      <button class="btn btn-danger" id="confirm-ok-btn">Delete</button>
    </div>
  </div>
</div>

<!-- ── TOAST CONTAINER ──────────────────────────────────────────── -->
<div class="toast-container" id="toast-container" aria-live="polite"></div>

<!-- ── UNIT SUGGESTIONS DATALIST ────────────────────────────────── -->
<datalist id="unit-suggestions">
  <option value="g">
  <option value="ml">
  <option value="mg">
</datalist>


<!-- ── SCRIPT ───────────────────────────────────────────────────── -->
<script src="js/app.js"></script>
</body>
</html>
